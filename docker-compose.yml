version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./db/hostbook.db
      - SECRET_KEY=change-me-in-production
      - AGENT_TOKEN=change-me-agent-secret
    volumes:
      - hostbook-db:/app/db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hostbook-db:
